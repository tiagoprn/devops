session_name: TRICORDER
windows:
  - window_name: editor
    layout: even-vertical
    start_directory: /storage/src/tricorder
    panes:
      - shell_command:
        - nvim README.md
        focus: true
  - window_name: AI
    layout: even-vertical
    start_directory: /storage/src/tricorder
    panes:
      - shell_command:
  - window_name: git
    layout: even-vertical
    start_directory: /storage/src/tricorder
    panes:
      - shell_command:
        - /storage/src/dot_files/git-ui-with-ssh-agent.sh .
  - window_name: database
    layout: even-vertical
    start_directory: /home/tiago/.local/share/repeater
    panes:
      - shell_command: ls -lha
      - shell_command: cd backups && ls -lha
  - window_name: cheatsheet
    layout: even-vertical
    start_directory: /storage/src/tricorder
    panes:
      - shell_command: cat /storage/src/devops/cheats/repeater.cheat
  - window_name: shell
    layout: even-vertical
    start_directory: /storage/src/tricorder
    panes:
      - shell_command: clear && echo -e "AVAILABLE CARDS:\n\n " && navi --query "repeater recursively show how many" --best-match && echo -e "\n---\n" && echo -e "DUE NOW SUMMARY:\n\n " && navi --query "repeater due" --best-match && echo -e "\n---\n" && repeater --help
