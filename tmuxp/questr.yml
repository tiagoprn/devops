session_name: questr-app
windows:
  - window_name: ide
    layout: even-vertical
    start_directory: /storage/src/questr
    shell_command_before:
      - source .venv/bin/activate && clear
    panes:
      - nvim
  - window_name: AI
    layout: even-vertical
    start_directory: /storage/src/questr
    shell_command_before:
      - source .venv/bin/activate && clear
    panes:
      - pi
  - window_name: git
    layout: even-vertical
    start_directory: /storage/src/questr
    panes:
      - shell_command:
        - /storage/src/dot_files/git-ui-with-ssh-agent.sh .
  - window_name: scratchpad
    layout: even-vertical
    start_directory: /storage/src/questr
    shell_command_before:
      - source .venv/bin/activate && clear
    panes:
      -
